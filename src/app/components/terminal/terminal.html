<!-- Floating Toggle Button -->
<button class="terminal-fab" (click)="toggle()" [class.active]="isOpen()" aria-label="Toggle terminal">
  @if (isOpen()) {
    <i class="fas fa-times"></i>
  } @else {
    <i class="fas fa-terminal"></i>
  }
  <span class="fab-tooltip">{{ isOpen() ? 'Close' : 'Try my terminal' }} <kbd>Ctrl+`</kbd></span>
</button>

<!-- Terminal Overlay -->
@if (isOpen()) {
  <div class="terminal-overlay" (click)="close()"></div>
  <div class="terminal-panel" (click)="focusInput()">
    <!-- Title Bar -->
    <div class="terminal-titlebar">
      <div class="terminal-buttons">
        <span class="btn-close" (click)="close()"></span>
        <span class="btn-minimize"></span>
        <span class="btn-maximize"></span>
      </div>
      <span class="terminal-title">amaan&#64;portfolio: ~</span>
      <div class="terminal-hint-bar">
        <span>type <kbd>help</kbd></span>
        <span><kbd>↑↓</kbd> history</span>
        <span><kbd>Esc</kbd> close</span>
      </div>
    </div>

    <!-- Terminal Body -->
    <div class="terminal-body" #terminalBody>
      @for (line of lines(); track $index) {
        <div class="terminal-line" [class]="'line-' + line.type">
          @if (line.type === 'input') {
            <span class="prompt">
              <span class="prompt-user">amaan</span><span class="prompt-at">&#64;</span><span class="prompt-host">portfolio</span><span class="prompt-colon">:</span><span class="prompt-path">~</span><span class="prompt-dollar">$</span>
            </span>
            <span class="command-text">{{ line.text }}</span>
          } @else {
            <pre class="output-text">{{ line.text }}</pre>
          }
        </div>
      }

      <!-- Active Input Line -->
      <div class="terminal-line input-line">
        <span class="prompt">
          <span class="prompt-user">amaan</span><span class="prompt-at">&#64;</span><span class="prompt-host">portfolio</span><span class="prompt-colon">:</span><span class="prompt-path">~</span><span class="prompt-dollar">$</span>
        </span>
        <input
          #terminalInput
          type="text"
          class="terminal-input"
          [value]="currentInput()"
          (input)="currentInput.set(terminalInput.value)"
          (keydown)="onKeyDown($event)"
          [disabled]="isTyping()"
          spellcheck="false"
          autocomplete="off"
          aria-label="Terminal input"
        />
      </div>
    </div>
  </div>
}
